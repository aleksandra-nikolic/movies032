<div class="wrapper-header">
  <h1 class="text-3xl mb-4">Movies</h1>
  <div class="input-search">
    <input (input)="onSearch()" type="text" placeholder="Search" [(ngModel)]="searchTerm" />
  </div>
</div>

<div class="mx-auto grid grid-cols-2 md:grid-cols-5 gap-x-4 gap-y-6">
  @for (item of filteredMovies(); track item.id) {
    <div class="flex flex-col">
      <button
        (click)="goToDescription(item.id, 'movie')"
        type="button"
        class="rounded-lg overflow-hidden shadow-lg cursor-pointer hover:scale-102 transition-transform duration-300 mb-2"
      >
        <img
          class="w-full object-cover"
          [src]="'https://image.tmdb.org/t/p/w500' + item.poster_path"
          alt=""
        />
      </button>
      <p class="text-sm font-semibold">{{ item.title || item.name }}</p>
    </div>
  } @empty {
    <div class="empty-state">
      <p>No items found.</p>
    </div>
  }
</div>
